name: Deploy Backend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload backend files to Hostinger
        run: |
          lftp -u "${{ secrets.HOSTINGER_FTP_USERNAME }}","${{ secrets.HOSTINGER_FTP_PASSWORD }}" -p "${{ secrets.HOSTINGER_FTP_PORT }}" "${{ secrets.HOSTINGER_FTP_SERVER }}" <<EOF
          set net:timeout 20
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30
          set ftp:passive-mode true
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose ./backend/ ./public_html/backend/
          bye
          EOF

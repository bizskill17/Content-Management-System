name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_API_BASE: https://jhatpatai.bizskilledu.com/backend/api

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload static files to Hostinger
        run: |
          lftp -u "${{ secrets.HOSTINGER_FTP_USERNAME }}","${{ secrets.HOSTINGER_FTP_PASSWORD }}" -p "${{ secrets.HOSTINGER_FTP_PORT }}" "${{ secrets.HOSTINGER_FTP_SERVER }}" <<EOF
          set cmd:fail-exit true
          set net:timeout 60
          set net:max-retries 10
          set net:persist-retries 10
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30
          set ftp:passive-mode true
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose --parallel=1 --exclude-glob backend/** ./out/ ./
          bye
          EOF

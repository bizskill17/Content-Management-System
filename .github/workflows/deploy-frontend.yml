name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload static files to Hostinger
        run: |
          lftp -u "${{ secrets.HOSTINGER_FTP_USERNAME }}","${{ secrets.HOSTINGER_FTP_PASSWORD }}" -p "${{ secrets.HOSTINGER_FTP_PORT }}" "${{ secrets.HOSTINGER_FTP_SERVER }}" <<EOF
          set cmd:fail-exit true
          set net:timeout 20
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30
          set ftp:passive-mode true
          set ssl:verify-certificate no
          cd ./public_html/
          glob -a rm -f *.html
          rm -rf ./_next
          rm -rf ./blog
          rm -rf ./checklists
          rm -rf ./course
          rm -rf ./courses
          rm -rf ./dashboard
          rm -rf ./downloads
          rm -rf ./lesson
          rm -rf ./login
          rm -rf ./pricing
          rm -rf ./register
          rm -rf ./templates
          rm -rf ./tools
          cd -
          mirror --reverse --delete --verbose ./out/ ./public_html/
          bye
          EOF
